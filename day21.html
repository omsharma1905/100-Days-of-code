<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animations</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            overflow: hidden;
        }

        .sliding-box {
            width: 100px;
            height: 100px;
            background-color: #ff4b5c;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            animation: slideLeft 3s linear infinite;
        }

        @keyframes slideLeft {
            from {
                left: 100vw;
            }
            to {
                left: -120px;
            }
        }
    </style>
</head>
<body>
    <div class="sliding-box"></div>
</body>
</html>
