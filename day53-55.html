<!-- Made a Project named LeetMetric App using HTML, CSS & JavaScript!! -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeetCode Metrics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: url('https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            backdrop-filter: blur(16px);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            text-align: center;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            outline: none;
        }

        input::placeholder {
            color: #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #ff9800, #f44336);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: linear-gradient(to right, #f57c00, #e53935);
        }

        #output {
            margin-top: 24px;
            text-align: left;
        }

        #output p {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 15px;
        }

        canvas {
            margin-top: 25px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📊 LeetCode Metrics Dashboard</h1>
        <input type="text" id="username" placeholder="Enter LeetCode username" />
        <button onclick="getUserStats()">Get Stats</button>
        <div id="output"></div>
        <canvas id="chart" width="300" height="300"></canvas>
    </div>

    <script>
        async function getUserStats() {
            const username = document.getElementById('username').value.trim();
            const output = document.getElementById('output');
            output.innerHTML = 'Loading...';

            const query = `
        query getUserProfile($username: String!) {
          matchedUser(username: $username) {
            username
            submitStats: submitStatsGlobal {
              acSubmissionNum {
                difficulty
                count
              }
            }
          }
        }`;

            try {
                const response = await fetch('https://cors-anywhere.herokuapp.com/https://leetcode.com/graphql', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        query: query,
                        variables: { username: username }
                    })
                });

                const data = await response.json();
                const stats = data.data.matchedUser?.submitStats?.acSubmissionNum;

                if (!stats) {
                    output.innerHTML = '❌ User not found or no data available.';
                    return;
                }

                let html = `<h3 style="margin-bottom: 15px;">✅ Stats for <span style="color: #ffd54f">${username}</span></h3>`;
                const labels = [], counts = [];
                stats.forEach(stat => {
                    html += `<p><strong>${stat.difficulty}:</strong> ${stat.count} problems</p>`;
                    labels.push(stat.difficulty);
                    counts.push(stat.count);
                });

                output.innerHTML = html;
                renderChart(labels, counts);
            } catch (error) {
                output.innerHTML = "⚠️ Something went wrong. Please try again later.";
                console.error(error);
            }
        }

        function renderChart(labels, data) {
            const ctx = document.getElementById('chart').getContext('2d');
            if (window.myChart) {
                window.myChart.destroy();
            }
            window.myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Solved',
                        data: data,
                        backgroundColor: ['#4caf50', '#ff9800', '#f44336'],
                        borderColor: '#fff',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#fff',
                                font: {
                                    weight: 'bold'
                                }
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>

</html>
