<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insight Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #111;
        }

        .card {
            display: flex;
            width: 900px;
            height: 400px;
            background-color: #4b0a50;
            color: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card-content {
            width: 50%;
            padding: 50px;
        }

        .card-content h1 {
            font-size: 28px;
            margin-bottom: 15px;
        }

        .card-content p {
            font-size: 16px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .stats {
            display: flex;
            gap: 30px;
        }

        .stats div {
            text-align: center;
        }

        .stats div h2 {
            font-size: 22px;
        }

        .stats div p {
            font-size: 14px;
            opacity: 0.8;
        }

        .card-image {
            width: 50%;
            background: url('https://via.placeholder.com/450') no-repeat center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="card-content">
            <h1>Get insights that help your business grow</h1>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Adipisci ipsum odit eaque accusantium totam
                repellendus minus sit. Consequuntur, deleniti dignissimos?</p>
            <div class="stats">
                <div>
                    <h2>10K+</h2>
                    <p>Comments</p>
                </div>
                <div>
                    <h2>214</h2>
                    <p>Paid Users</p>
                </div>
                <div>
                    <h2>12M+</h2>
                    <p>Views</p>
                </div>
            </div>
        </div>
        <div class="card-image">
            <img src="" alt="Insight Image">
        </div>
    </div>

</body>

</html>
